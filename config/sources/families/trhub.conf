write_uboot_platform() {
	local unable_install_uboot="Unable to install U-Boot."
	local method=0

	if [[ "$2" == *mmcblk* ]]; then
		local mmcblk_prefix
		mmcblk_prefix=$(echo "$2" | grep -Po "mmcblk\d")
		logger "${FUNCNAME[0]}(): mmcblk_prefix = $mmcblk_prefix"

		if [[ -n "$mmcblk_prefix" ]]; then
			local mmc_boot=${mmcblk_prefix}boot
			local of_boot0=/dev/${mmc_boot}0
			local of_boot1=/dev/${mmc_boot}1
			if [[ -e $of_boot0 ]]; then
				method=1
				logger "${FUNCNAME[0]}(): use install in boot emmc partitions"
			fi
		else
			logger "${FUNCNAME[0]}(): mmcblk_prefix is empty. $unable_install_uboot"
			return 1
		fi
	else
		logger "${FUNCNAME[0]}(): use standart u-boot install."
	fi

	dd if="$1/u-boot.bin" of="$2" bs=1 count=442 conv=fsync >/dev/null 2>&1
	dd if="$1/u-boot.bin" of="$2" bs=512 skip=1 seek=1 conv=fsync >/dev/null 2>&1

	if [[ $method == 1 ]]; then
		logger "${FUNCNAME[0]}(): of_boot0 = $of_boot0"
		logger "${FUNCNAME[0]}(): of_boot1 = $of_boot1"

		# unset force-read-only flag
		echo 0 >"/sys/block/${mmc_boot}0/force_ro"
		echo 0 >"/sys/block/${mmc_boot}1/force_ro"
		logger "${FUNCNAME[0]}(): /sys/block/${mmc_boot}0/force_ro value after unsetting read-only flag: $(<"/sys/block/${mmc_boot}0/force_ro")"
		logger "${FUNCNAME[0]}(): /sys/block/${mmc_boot}1/force_ro value after unsetting read-only flag: $(<"/sys/block/${mmc_boot}1/force_ro")"

		local uboot_name=u-boot.bin
		local uboot_size_in_kbytes=$(($(stat --printf "%s" "$1/$uboot_name") / 1024))
		local uboot_offset=1 # 512 bytes in dd
		logger "${FUNCNAME[0]}(): uboot_size_in_kbytes = $uboot_size_in_kbytes"
		logger "${FUNCNAME[0]}(): uboot_offset = $uboot_offset"
		dd if="$1/u-boot.bin" of="$of_boot0" bs=512 skip=1 conv=fsync >/dev/null 2>&1
		dd if="$1/u-boot.bin" of="$of_boot1" bs=512 skip=1 conv=fsync >/dev/null 2>&1
	fi

	logger "${FUNCNAME[0]}(): u-boot successfulley installed"
}

comment_default_rsyslog_rules() {
	local conf_file="$SDCARD/etc/rsyslog.d/50-default.conf"

	if [[ ! -f "${conf_file}" ]]; then
		display_alert "Can't find rsyslog default config at ${conf_file}" "${RELEASE}" "wrn"
		return 2
	fi

	local rule_file_arr=(/var/log/syslog /var/log/auth.log /var/log/kern.log /var/log/mail.log /var/log/mail.err)

	rule_file_escaped_arr=("${rule_file_arr[@]}")
	for ((i = 0; i < ${#rule_file_escaped_arr[*]}; i++)); do
		rule_file_escaped_arr[$i]="${rule_file_arr[$i]//\//\\/}"
	done

	for ((i = 0; i < ${#rule_file_escaped_arr[*]}; i++)); do
		rule_file_escaped="${rule_file_escaped_arr[$i]}"
		regexp="^[^#][^ \t]+[ \t]+.?${rule_file_escaped}.*$"
		if grep -Pq "$regexp" "$conf_file"; then
			sed -i -E -e "s/$regexp/#\0/g" "$conf_file" || {
				echo "sed 's/$regexp/#\0/g' $conf_file failed"
				return 1
			}
		else
			echo "grep '$regexp' $conf_file failed"
			return 2
		fi
	done
}

build_linuxBox_supervisor_cmds() {
    display_alert "Packaging LinuxBox Supervisor" "@host" "info"
    fetch_from_repo "https://github.com/thirdreality/LinuxBox_Supervisor.git" "LinuxBox_Supervisor" "tag:v1.13.01.12"

    local tmp_dir plugin_dir supervised_dir

    tmp_dir=$(mktemp -d)
    if [[ ! -d $tmp_dir ]]; then
        display_alert "Unable to create temporary directory" "${BOARD}" "err"
        return 1
    fi

    plugin_dir="linuxbox_supervisor"
    supervised_dir="${SRC}/cache/sources/LinuxBox_Supervisor"

    # Update DEVICE_BUILD_NUMBER with current date and time in format YYYYMMDD-HHMM
    current_date=$(date +"%Y%m%d-%H%M")
    display_alert "Updating DEVICE_BUILD_NUMBER to ${current_date}" "@host" "info"
    sed -i "s/DEVICE_BUILD_NUMBER=\"[0-9]*-[0-9]*\"/DEVICE_BUILD_NUMBER=\"${current_date}\"/" "${supervised_dir}/supervisor/const.py"

    mkdir -p "${tmp_dir}/${plugin_dir}/usr/local/bin" || exit_with_error "Unable to mkdir /usr/local/bin"
    mkdir -p "${tmp_dir}/${plugin_dir}/etc/systemd/system" || exit_with_error "Unable to mkdir /etc/systemd/system"
    mkdir -p "${tmp_dir}/${plugin_dir}/usr/local/lib/python3.11/dist-packages" || exit_with_error "Unable to mkdir dist-packages"

    cp -r "${supervised_dir}/supervisor" "${tmp_dir}/${plugin_dir}/usr/local/lib/python3.11/dist-packages" || exit_with_error "Unable to copy supervisor directory"
    cp "${supervised_dir}/bin/supervisor" "${tmp_dir}/${plugin_dir}/usr/local/bin/" || exit_with_error "Unable to copy supervisor"
    chmod +x "${tmp_dir}/${plugin_dir}/usr/local/bin/supervisor" || exit_with_error "Unable to set supervisor mode"

    cp "${supervised_dir}/supervisor.service" "${tmp_dir}/${plugin_dir}/etc/systemd/system/" || exit_with_error "Unable to copy supervisor.service"

	if [ -f "${supervised_dir}/bin/btgatt-config-server" ]; then
    	cp "${supervised_dir}/bin/btgatt-config-server" "${tmp_dir}/${plugin_dir}/usr/local/bin/" || exit_with_error "Unable to copy btgatt-config-server"
    	chmod +x "${tmp_dir}/${plugin_dir}/usr/local/bin/btgatt-config-server" || exit_with_error "Unable to set btgatt-config-server mode"
	fi

	if [ -f "${supervised_dir}/btgatt-config.service" ]; then
		cp "${supervised_dir}/btgatt-config.service" "${tmp_dir}/${plugin_dir}/etc/systemd/system/" || exit_with_error "Unable to copy btgatt-config.service"
	fi

    cd "${tmp_dir}/${plugin_dir}" || exit_with_error "Unable to cd ${tmp_dir}/${plugin_dir}"

    # set up control file
    mkdir -p DEBIAN

    cat <<-END > "DEBIAN/control"
Package: linuxbox-supervisor
Version: $REVISION
Architecture: all
Maintainer: $MAINTAINER <$MAINTAINERMAIL>
Installed-Size: 1
Section: utils
Priority: optional
Description: LinuxBox Supervisor By ThirdReality
END

    # set up post install script
    cat <<-END > "DEBIAN/postinst"
#!/bin/sh
chmod +x /usr/local/bin/supervisor
chmod +x /usr/local/bin/btgatt-config-server
systemctl --no-reload enable supervisor.service >/dev/null 2>&1
exit 0
END

    chmod 755 "DEBIAN/postinst"

    cd "${tmp_dir}" || exit
    # pack
    display_alert "Building LinuxBox Supervisor package" "linuxbox-supervisor_${REVISION}" "info"
    fakeroot dpkg-deb -b -Z"${DEB_COMPRESS}" "${tmp_dir}/${plugin_dir}" "linuxbox-supervisor_${REVISION}.deb" >> "${DEST}/${LOG_SUBPATH}/install.log" 2>&1 || true

	ls -l "${tmp_dir}/linuxbox-supervisor_${REVISION}.deb"
	rsync --remove-source-files -rq "${tmp_dir}/linuxbox-supervisor_${REVISION}.deb" "${DEB_STORAGE}/"

    # remove temp directory
    rm -rf "${tmp_dir}/${plugin_dir}"
}


family_tweaks() {
	# Log rotation
	comment_default_rsyslog_rules || display_alert "Unable to comment default rsyslog rules" "${BOARD}" "wrn"

	supervised_dir="${SRC}/cache/sources/LinuxBox_Supervisor"

	# LinuxBox SuperVisor
	if [[ -d "${supervised_dir}" ]]; then
		display_alert "Enable supervisor.service ..."
		chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable supervisor.service >/dev/null 2>&1"
	else
		# Hardware init
		display_alert "Enable hubv3-init.service & hubv3-monitor.service ..."
		chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable hubv3-init.service >/dev/null 2>&1"
		chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable hubv3-monitor.service >/dev/null 2>&1"
		chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable hubv3-btgatt-server.service >/dev/null 2>&1"
	fi

	#chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable thirdreality-health-checker.service >/dev/null 2>&1"

	# AR-1098 userland fix for net interface does not up at boot
	#chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload enable jethub-ethreset.service >/dev/null 2>&1"

	# Hostapd
	chroot "${SDCARD}" /bin/bash -c "systemctl --no-reload disable hostapd.service >/dev/null 2>&1"
}

