name: Build LinuxBox-Dev firmware

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board: trhubv3, trhubv3b, linuxbox"
        required: true
        default: "trhubv3"
      dist:
        description: "Distribution: cn, us, kr"
        required: true
        default: "us"
      revision:
        description: "Revision (optional)"
        required: true
        default: "v1.13.01.11"

jobs:
  build-linuxbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Switch to hubv3 branch
        run: git checkout hubv3

      - name: Clean up workspace before build
        run: |
          echo "Cleaning up workspace before build..."
          # 清理输出目录和用户补丁目录
          sudo rm -rf "${{ github.workspace }}/output/"
          sudo rm -rf "${{ github.workspace }}/userpatches/"
          # 清理缓存目录
          sudo rm -rf "${{ github.workspace }}/cache/sources/u-boot"
          sudo rm -rf "${{ github.workspace }}/cache/sources/linux-"*
          sudo rm -rf /mnt/linuxbox

      - name: List files in the repository
        run: |
          echo "List files in the repository..."
          ls ${{ github.workspace }}
          echo "Disk usage before Install dependencies ..."
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y uuid-runtime systemd acl sudo
      - name: Install git for checkout
        run: |
          sudo apt-get update
          sudo apt-get install -y git dialog psmisc acl uuid uuid-runtime curl gawk

      - name: Set git safe.directory for CI
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ca-certificates gcc build-essential python3 python3-dev python3-venv python3-pip pv xz-utils patchutils

      - name: Clean up after dependencies
        run: |
          sudo apt-get clean
          sudo apt-get autoremove -y
          echo "Disk usage after dependency installation:"
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          echo "Disk usage after cleanup:"
          df -h

      - name: Remap heavy outputs to /mnt
        run: |
          echo "Re-map output directory to /mnt..."
          sudo mkdir -p /mnt/linuxbox/output
          sudo chmod 777 /mnt/linuxbox/output
          # 移除并改为符号链接
          rm -rf "${{ github.workspace }}/output" || true
          ln -s /mnt/linuxbox/output "${{ github.workspace }}/output"
          echo "After remap:"
          df -h

      - name: Make script executable
        run: chmod +x make_armbian_for_hubv3.sh

      - name: Build firmware
        run: |
          if [ -n "${{ github.event.inputs.revision }}" ]; then
            ./make_armbian_for_hubv3.sh -b ${{ github.event.inputs.board }} -d ${{ github.event.inputs.dist }} -r ${{ github.event.inputs.revision }}
          else
            ./make_armbian_for_hubv3.sh -b ${{ github.event.inputs.board }} -d ${{ github.event.inputs.dist }}
          fi

      - name: List output files for debugging
        run: |
          echo "Checking output directory structure..."
          ls -lah output/ || echo "output/ not found"
          ls -lah output/images/ || echo "output/images/ not found"
          find output -name "*.img" -type f 2>/dev/null || echo "No .img files found in output/"
          echo "Checking /mnt/linuxbox/output..."
          ls -lah /mnt/linuxbox/output/ || echo "/mnt/linuxbox/output/ not found"
          ls -lah /mnt/linuxbox/output/images/ || echo "/mnt/linuxbox/output/images/ not found"
          find /mnt/linuxbox/output -name "*.img" -type f 2>/dev/null || echo "No .img files found in /mnt/linuxbox/output/"

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxBox-images${{ github.event.inputs.revision && format('-{0}', github.event.inputs.revision) || '' }}
          path: |
            /mnt/linuxbox/output/images/*.img
            /mnt/linuxbox/output/images/*.xz
          if-no-files-found: warn

      - name: Clean up after upload
        run: |
          echo "Cleaning up workspace after successful upload..."
          # 删除整个工作区以释放磁盘空间 (使用 sudo 避免权限问题)
          sudo rm -rf "${{ github.workspace }}"/*
          # 删除在 /mnt 创建的临时与输出目录
          sudo rm -rf /mnt/linuxbox
          echo "Final disk usage:"
          df -h