name: Build LinuxBox-Dev firmware

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board: trhubv3, trhubv3b, linuxbox"
        required: true
        default: "trhubv3"
      dist:
        description: "Distribution: cn, us, kr"
        required: true
        default: "us"
      revision:
        description: "Revision (optional)"
        required: true
        default: "v1.13.01.11"

jobs:
  build-linuxbox:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /mnt/linuxbox
    steps:
      - name: Clean up before build
        run: |
          echo "Cleaning up /mnt/linuxbox before build..."
          sudo rm -rf /mnt/linuxbox
          echo "Disk usage before build:"
          df -h
        working-directory: /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y uuid-runtime systemd acl sudo git dialog psmisc uuid curl gawk ca-certificates gcc build-essential python3 python3-dev python3-venv python3-pip pv xz-utils patchutils binfmt-support qemu-user-static
        working-directory: /

      - name: Clone repository to /mnt/linuxbox
        run: |
          echo "Cloning repository to /mnt/linuxbox..."
          sudo mkdir -p /mnt/linuxbox
          sudo chown -R $USER:$USER /mnt/linuxbox
          git clone --depth 1 --branch hubv3 ${{ github.server_url }}/${{ github.repository }} /mnt/linuxbox
          echo "Repository cloned successfully"
          ls -lah /mnt/linuxbox
          echo "Disk usage after clone:"
          df -h
        working-directory: /

      - name: Set git safe.directory for CI
        run: git config --global --add safe.directory /mnt/linuxbox
        working-directory: /

      - name: Make script executable
        run: chmod +x /mnt/linuxbox/make_armbian_for_hubv3.sh

      - name: Build firmware
        run: |
          if [ -n "${{ github.event.inputs.revision }}" ]; then
            cd /mnt/linuxbox; ./make_armbian_for_hubv3.sh -b ${{ github.event.inputs.board }} -d ${{ github.event.inputs.dist }} -r ${{ github.event.inputs.revision }}
          else
            cd /mnt/linuxbox; ./make_armbian_for_hubv3.sh -b ${{ github.event.inputs.board }} -d ${{ github.event.inputs.dist }}
          fi

      - name: List output files for debugging
        run: |
          echo "Checking output directory structure..."
          cd /mnt/linuxbox
          ls -lah output/ || echo "output/ not found"
          ls -lah output/images/ || echo "output/images/ not found"
          find output -name "*.img" -type f 2>/dev/null || echo "No .img files found in output/"
          echo "Disk usage after build:"
          df -h

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxBox-images${{ github.event.inputs.revision && format('-{0}', github.event.inputs.revision) || '' }}
          path: |
            /mnt/linuxbox/output/images/*.img
            /mnt/linuxbox/output/images/*.xz
          if-no-files-found: warn

      - name: Clean up after upload
        run: |
          echo "Cleaning up after successful upload..."
          sudo rm -rf /mnt/linuxbox
          echo "Final disk usage:"
          df -h
        working-directory: /